<!DOCTYPE html>
<html>
<head>
  <title>8i</title>
</head>
<body>

  <button onclick="playGame('heads');">heads</button>
  <button onclick="playGame('tails');">tails</button>

  <script>
    function playGame(guess) {
      // 1. Generate a random number between 0 and 1
      const randomNumber = Math.random();

      // 2. Determine the result based on the random number
      let result = '';
      if (randomNumber < 0.5) {
        result = 'heads';
      } else {
        result = 'tails';
      }

      // 3. Compare the guess to the result and print to console
      if (guess === result) {
        console.log('You win!');
      } else {
        console.log('You lose!');
      }
    }
  </script>

</body>
</html>
