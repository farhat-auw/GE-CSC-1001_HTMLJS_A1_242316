<!DOCTYPE html>
<html>
<head>
  <title>8i</title>
</head>
<body>

  <button onclick="playGame('heads');">heads</button>
  <button onclick="playGame('tails');">tails</button>

  <script>
    // 1. Create the score object outside the function
    // so it doesn't reset every time we click a button.
    let score = {
      wins: 0,
      losses: 0
    };

    function playGame(guess) {
      const randomNumber = Math.random();
      let result = '';

      if (randomNumber < 0.5) {
        result = 'heads';
      } else {
        result = 'tails';
      }

      // 2. Update the score object based on the result
      if (guess === result) {
        score.wins = score.wins + 1;
        console.log('You win!');
      } else {
        score.losses = score.losses + 1;
        console.log('You lose!');
      }

      // 3. Display the updated score object in the console
      console.log(score);
    }
  </script>

</body>
</html>
