<body>

  <script>

    function greet(name) {

      if (!name) {
        console.log('Hi there!');
      } else {

        console.log(`Hello ${name}!`);
      }
    }


    greet();
    

    greet('Simon');
    greet('Alice');
    greet('Bob');
  </script>

</body>
