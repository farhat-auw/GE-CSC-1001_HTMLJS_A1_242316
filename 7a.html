<!DOCTYPE html>
<html>
<head>
  <title>7a</title>
</head>
<body>

  <script>
    // 7a, 7b, and 7c: Defining the greet function
    function greet(name) {
      // 7c: Check if name is undefined (falsy)
      if (!name) {
        console.log('Hi there!');
      } else {
        // 7b: Use template literals to include the name
        console.log(`Hello ${name}!`);
      }
    }

    // 7a: Calling the function
    greet(); // Displays: Hi there!
    
    // 7b: Calling with different names
    greet('Simon'); // Displays: Hello Simon!
    greet('Alice'); // Displays: Hello Alice!
    greet('Bob');   // Displays: Hello Bob!
  </script>

</body>
</html>
