<!DOCTYPE html>
<html>
<head>
  <title>7a</title>
</head>
<body>

  <script>
    /* ... your greet function from before ... */

    function convertLength(length, from, to) {
      // 7i: Check for invalid 'from' unit
      if (from !== 'km' && from !== 'miles' && from !== 'ft') {
        return `Invalid unit: ${from}`;
      }
      // 7i: Check for invalid 'to' unit
      else if (to !== 'km' && to !== 'miles' && to !== 'ft') {
        return `Invalid unit: ${to}`;
      }

      // If units are the same, return the same length
      if (from === to) {
        return `${length} ${to}`;
      }

      // 7g: Convert between miles and km
      if (from === 'miles' && to === 'km') {
        return `${length * 1.6} km`;
      } else if (from === 'km' && to === 'miles') {
        return `${length / 1.6} miles`;
      }

      // 7h: Support for feet (ft)
      else if (from === 'miles' && to === 'ft') {
        return `${length * 5280} ft`;
      } else if (from === 'km' && to === 'ft') {
        return `${length * 3281} ft`;
      } else if (from === 'ft' && to === 'miles') {
        return `${length / 5280} miles`;
      } else if (from === 'ft' && to === 'km') {
        return `${length / 3281} km`;
      }
    }

    // Testing the function with examples from the sheet:
    console.log(convertLength(50, 'miles', 'km'));   // '80 km'
    console.log(convertLength(32, 'km', 'miles'));   // '20 miles'
    console.log(convertLength(50, 'km', 'km'));      // '50 km'
    console.log(convertLength(5, 'miles', 'lbs'));   // 'Invalid unit: lbs'
  </script>

</body>
</html>
